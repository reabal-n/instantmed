name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6.0.2

      - name: Setup pnpm
        uses: pnpm/action-setup@v6.0.5

      - name: Use Node.js from .nvmrc
        uses: actions/setup-node@v6.4.0
        with:
          node-version-file: '.nvmrc'
          cache: 'pnpm'

      - name: Check active Node runtime
        run: bash scripts/check-node-runtime.sh

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Restore Next.js build cache
        uses: actions/cache@v5
        with:
          path: .next/cache
          key: ${{ runner.os }}-nextjs-${{ hashFiles('pnpm-lock.yaml') }}-${{ hashFiles('app/**', 'components/**', 'content/**', 'lib/**', 'public/**', 'next.config.*', 'postcss.config.*', 'tailwind.config.*', 'tsconfig.json', 'package.json') }}
          restore-keys: |
            ${{ runner.os }}-nextjs-${{ hashFiles('pnpm-lock.yaml') }}-

      - name: Check stack pins (Next + tooling/React/Tailwind/Framer Motion)
        run: bash scripts/check-stack-pins.sh

      - name: Check dependency dedupe
        run: pnpm dedupe --check

      - name: Check placeholder URL env values
        run: pnpm check:placeholder-env

      - name: Supabase schema lint
        env:
          POSTGRES_URL_NON_POOLING: ${{ secrets.POSTGRES_URL_NON_POOLING }}
        run: |
          if [ -z "$POSTGRES_URL_NON_POOLING" ]; then
            echo "::warning::POSTGRES_URL_NON_POOLING is not configured; skipping remote Supabase schema lint"
            exit 0
          fi
          npx supabase@2.72.7 db lint \
            --db-url "$POSTGRES_URL_NON_POOLING" \
            --schema public,extensions \
            --fail-on error

      - name: Security audit
        run: pnpm audit --audit-level=high

      - name: "Run lint (budget: 60s)"
        run: |
          START=$(date +%s)
          pnpm lint --max-warnings 0
          ELAPSED=$(( $(date +%s) - START ))
          echo "Lint completed in ${ELAPSED}s"
          if [ "$ELAPSED" -gt 60 ]; then
            echo "::warning::Lint exceeded 60s budget (${ELAPSED}s) -- investigate slow rules"
          fi

      - name: Voice guard (banned phrases + em-dashes in marketing surfaces)
        run: pnpm vitest run lib/__tests__/voice-guard.test.ts

      - name: Health guide image audit
        run: pnpm content:audit:images

      - name: Type-check
        run: pnpm typecheck

      - name: Run unit tests with coverage
        run: pnpm test --run --coverage

      - name: Check design token compliance
        run: bash scripts/verify-tokens.sh

      - name: Check for route conflicts
        run: bash scripts/check-route-conflicts.sh

      - name: Check for orphaned files
        run: bash scripts/check-orphaned-files.sh

      - name: Dead-code baseline ratchet
        run: pnpm deadcode:check

      - name: AGENTS.md is in sync with CLAUDE.md
        run: bash scripts/sync-agent-doc.sh --check

      - name: Doc surface audit (count + plan-refs + 8 pinning contracts)
        run: pnpm doc:audit

      - name: Portal design-system compliance (no legacy classes)
        run: bash scripts/check-portal-no-legacy-classes.sh

      - name: Ban keyword-substring anti-pattern in clinical/safety code
        run: bash scripts/check-keyword-substring-antipattern.sh

      - name: "Type-check and build (target: 180s, warning: 210s)"
        env:
          NEXT_PUBLIC_SUPABASE_URL: https://placeholder.supabase.co
          NEXT_PUBLIC_SUPABASE_ANON_KEY: placeholder-anon-key-for-build
          SUPABASE_SERVICE_ROLE_KEY: placeholder-service-role-key-for-build
          NEXT_PUBLIC_APP_URL: http://localhost:3000
          STRIPE_SECRET_KEY: sk_test_placeholder
          STRIPE_PRICE_MEDCERT: price_placeholder_medcert
          STRIPE_PRICE_MEDCERT_2DAY: price_placeholder_medcert_2day
          STRIPE_PRICE_MEDCERT_3DAY: price_placeholder_medcert_3day
          STRIPE_PRICE_REPEAT_SCRIPT: price_placeholder_repeat_script
          STRIPE_PRICE_CONSULT: price_placeholder_consult
          STRIPE_PRICE_CONSULT_ED: price_placeholder_consult_ed
          STRIPE_PRICE_CONSULT_HAIR_LOSS: price_placeholder_consult_hair_loss
          STRIPE_PRICE_CONSULT_WOMENS_HEALTH: price_placeholder_consult_womens_health
          STRIPE_PRICE_CONSULT_WEIGHT_LOSS: price_placeholder_consult_weight_loss
          STRIPE_PRICE_PRIORITY_FEE: price_placeholder_priority_fee
          STRIPE_PRICE_REPEAT_RX_MONTHLY: price_placeholder_repeat_rx_monthly
        run: pnpm build:release

      - name: Bundle size gate (shared first-load JS)
        run: bash scripts/check-bundle-size.sh

      - name: Parchment sandbox smoke
        if: ${{ vars.PARCHMENT_SMOKE_ENABLED == 'true' }}
        env:
          PARCHMENT_API_URL: ${{ secrets.PARCHMENT_API_URL }}
          PARCHMENT_PARTNER_ID: ${{ secrets.PARCHMENT_PARTNER_ID }}
          PARCHMENT_PARTNER_SECRET: ${{ secrets.PARCHMENT_PARTNER_SECRET }}
          PARCHMENT_ORGANIZATION_ID: ${{ secrets.PARCHMENT_ORGANIZATION_ID }}
          PARCHMENT_ORGANIZATION_SECRET: ${{ secrets.PARCHMENT_ORGANIZATION_SECRET }}
          PARCHMENT_SMOKE_USER_ID: ${{ secrets.PARCHMENT_SMOKE_USER_ID }}
        run: pnpm smoke:parchment

      # Detection complement to the pre-push gate: a direct push to main that
      # fails the build means production may be running unverified code AND the
      # red can sit unnoticed (it did for days on 2026-06-18). Ping Telegram so
      # it's seen. Only fires on push-to-main failures; PRs are gated by review.
      - name: Alert Telegram on main build failure
        if: ${{ failure() && github.event_name == 'push' && github.ref == 'refs/heads/main' }}
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          if [ -z "$TELEGRAM_BOT_TOKEN" ] || [ -z "$TELEGRAM_CHAT_ID" ]; then
            echo "::warning::TELEGRAM_BOT_TOKEN/CHAT_ID not set as Actions secrets - main-red alert skipped."
            exit 0
          fi
          run_url="${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"
          printf -v msg '🔴 main CI build FAILED - production may be unverified.\ncommit %.9s by %s\n%s' "$GITHUB_SHA" "$GITHUB_ACTOR" "$run_url"
          curl -sS --max-time 15 -X POST \
            "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
            --data-urlencode "chat_id=${TELEGRAM_CHAT_ID}" \
            --data-urlencode "text=${msg}" \
            --data-urlencode "disable_web_page_preview=true" \
            >/dev/null || echo "::warning::Telegram alert request failed (non-blocking)."

  lighthouse:
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6.0.2

      - name: Setup pnpm
        uses: pnpm/action-setup@v6.0.5

      - name: Use Node.js from .nvmrc
        uses: actions/setup-node@v6.4.0
        with:
          node-version-file: '.nvmrc'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        env:
          # Lighthouse needs the build artifact to actually serve pages at
          # runtime, so we wire real Supabase credentials (same as the e2e
          # job). Test-mode keys only; no live money risk. Pages we audit
          # are all public marketing routes.
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          NEXT_PUBLIC_APP_URL: http://localhost:3000
        run: pnpm build

      - name: Install Lighthouse CI
        run: npm install -g @lhci/cli

      - name: Run Lighthouse CI
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          NEXT_PUBLIC_APP_URL: http://localhost:3000
        run: |
          # We deliberately do NOT use --assert.preset="lighthouse:recommended"
          # because that enables every individual audit at "error" severity,
          # which is too noisy (e.g. it flags legitimate third-party-SDK
          # console warnings as best-practices failures). Instead we assert
          # at the category-score level only.
          #
          # accessibility + seo are now gated at "error" severity after the
          # 2026-04-08 design-system sweep that fixed:
          #   - color-contrast (text-muted-foreground/30+/40 on warm ivory bg)
          #   - heading-order (h1/h2 hierarchy in marketing sections +
          #     accordion category level + footer h4 → p)
          #   - label-content-name-mismatch (GoogleReviewsBadge aria-label
          #     didn't contain its visible rating/count text)
          #   - link-text (cookie-banner "Learn more" → descriptive text)
          #
          # performance + best-practices stay at "warn" — third-party SDKs
          # (PostHog, Sentry) hurt those scores but aren't blockers
          # for a pre-launch telehealth marketing site.
          # Specific metric budgets in addition to the overall perf category.
          # Metric-level assertions are deterministic — the aggregate score
          # varies ±5 points on cold Ubuntu runners, but the underlying
          # metrics (FCP/LCP/TBT/CLS) are stable.
          #
          # Budgets set after the 2026-04-20 perf sprint:
          #   FCP  <= 3.0s   (CI typically ~1.5s)
          #   LCP  WARN-ONLY (see note below)
          #   TBT  WARN-ONLY (CI runner CPU variance has produced 600ms-1s
          #        outliers on untouched marketing pages)
          #   CLS  <= 0.1    (UX requirement, not just lighthouse)
          #   overall perf score: warn-only (noisy)
          #
          # 2026-04-21: LCP demoted from "error" (5500ms) to "warn".
          #
          # Why: Lighthouse's simulated-throttling LCP is unstable on Ubuntu
          # runners for our heavy marketing pages (1MB+ total weight, 48-51
          # JS chunks, 400-1100 DOM elements). Local repro on a fast Mac
          # shows OBSERVED LCP = 181ms (real paint time) vs SIMULATED LCP
          # ranging 7.0-7.8s across all four audited URLs. /conditions and
          # /faq fail in CI with the same simulated render-delay (~6.5s)
          # that /medical-certificate posts when it passes — the differ-
          # ence is pure runner-to-runner CPU variance, not a structural
          # regression.
          #
          # Real LCP fixes already shipped in this commit (and prior):
          #   - removed opacity:0 mount-in animation on CenteredHero
          #     subtitle/children (was the LCP candidate on /conditions/*)
          #   - removed opacity:0 from WordReveal word-by-word animation
          #     (h1 LCP candidate on hero pages)
          #   - PostHog + Sentry already gated behind first interaction +
          #     4s fallback (instrumentation-client.ts)
          #   - DeferredMount used for non-critical providers in layout.tsx
          #
          # Tracking work: the right path to re-enable an error-level LCP
          # gate is structural — split the marketing client boundaries so
          # each landing page hydrates one small island instead of the
          # full <InformationalPageShell> tree, and trim the testimonials
          # carousel from 9 to 3 items per page. That's a multi-PR refactor
          # touching every marketing surface, scheduled post-launch. Until
          # then, LCP regressions still surface as warnings in the PR
          # report without blocking deploys for variance.
          #
          # FCP and CLS remain "error" so genuine load/shift regressions still
          # fail CI. TBT remains tracked here and is still stricter in the
          # scheduled production Lighthouse workflow. Mobile marketing
          # performance is tracked separately and should not block
          # clinical/admin safety fixes without a dedicated perf pass.
          #
          # Config + URLs live in `lighthouserc.json` (root). lhci picks it
          # up automatically — `lhci autorun` with no flags reads it. We
          # moved away from inline `--assert.assertions.X='[...]'` flags
          # because lhci's CLI parser treated `["warn", {opts}]` as a score
          # assertion regardless of the embedded `maxNumericValue` key.
          lhci autorun

      - name: Run mobile intake Lighthouse gate
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          NEXT_PUBLIC_APP_URL: http://localhost:3000
        run: |
          # Dedicated paid-intake gate. This intentionally audits /request
          # separately from the heavier desktop marketing LHCI config because
          # paid traffic lives or dies on mobile intake speed.
          #
          # Tracked warning:
          #   mobile performance >= 85 (composite score still reflects
          #        warn-only simulated LCP variance)
          #
          # Hard gates:
          #   FCP <= 2.0s
          #   TBT <= 300ms (matches the production TBT ceiling; GitHub
          #        runner CPU variance has produced 200-300ms outliers on
          #        untouched /request builds)
          #   CLS <= 0.05
          #
          # Simulated LCP remains warn-only until the global CSS/root-layout
          # split is done safely; the current bottleneck is render-blocking
          # CSS shared across the app, not route JS.
          lhci autorun --config=./lighthouserc.request.json

      - name: Upload Lighthouse results
        uses: actions/upload-artifact@v7.0.1
        if: always()
        with:
          name: lighthouse-report
          path: .lighthouseci/
          if-no-files-found: ignore
          retention-days: 14

  e2e:
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 30
    # The blocking E2E suite reuses a deterministic Supabase fixture set.
    # Serialize it across branches so one run's teardown cannot remove child
    # records while another run is inside the document/review flow.
    concurrency:
      group: instantmed-shared-e2e-fixtures
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@v6.0.2

      - name: Setup pnpm
        uses: pnpm/action-setup@v6.0.5

      - name: Use Node.js from .nvmrc
        uses: actions/setup-node@v6.4.0
        with:
          node-version-file: '.nvmrc'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright browsers
        run: pnpm exec playwright install --with-deps chromium

      - name: Verify required E2E secrets
        id: verify_e2e_secrets
        env:
          E2E_SECRET: ${{ secrets.E2E_SECRET }}
          ENCRYPTION_KEY: ${{ secrets.ENCRYPTION_KEY }}
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          STRIPE_WEBHOOK_SECRET: ${{ secrets.STRIPE_WEBHOOK_SECRET }}
          PARCHMENT_WEBHOOK_SECRET: ${{ secrets.PARCHMENT_WEBHOOK_SECRET }}
        run: |
          missing=0
          for name in E2E_SECRET ENCRYPTION_KEY NEXT_PUBLIC_SUPABASE_URL NEXT_PUBLIC_SUPABASE_ANON_KEY SUPABASE_SERVICE_ROLE_KEY STRIPE_WEBHOOK_SECRET PARCHMENT_WEBHOOK_SECRET; do
            if [ -z "${!name}" ]; then
              echo "::error::$name is required for the paid-flow E2E gate"
              missing=1
            fi
          done
          exit "$missing"

      - name: Run ops E2E smoke (Chromium)
        if: ${{ steps.verify_e2e_secrets.outcome == 'success' }}
        env:
          PLAYWRIGHT: '1'
          NEXT_PUBLIC_PLAYWRIGHT: '1'
          E2E_SECRET: ${{ secrets.E2E_SECRET }}
          ENCRYPTION_KEY: ${{ secrets.ENCRYPTION_KEY }}
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          NEXT_PUBLIC_APP_URL: http://localhost:3001
        run: pnpm exec playwright test --project=chromium e2e/admin.ops-index.spec.ts e2e/marketing-dashboard-nav.spec.ts e2e/dashboard.keyboard-safety.spec.ts

      - name: Run med cert readiness E2E gate (Chromium)
        # Run even when an earlier UI-nav step failed, so the duplicate-cert
        # readiness gate is never masked by unrelated flakiness. This step is
        # NOT error-tolerant: a failure here still fails the job; always() only
        # ensures the step runs (for full signal) regardless of prior steps.
        if: ${{ always() && steps.verify_e2e_secrets.outcome == 'success' }}
        env:
          PLAYWRIGHT: '1'
          NEXT_PUBLIC_PLAYWRIGHT: '1'
          E2E_SECRET: ${{ secrets.E2E_SECRET }}
          ENCRYPTION_KEY: ${{ secrets.ENCRYPTION_KEY }}
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          NEXT_PUBLIC_APP_URL: http://localhost:3001
          STRIPE_WEBHOOK_SECRET: ${{ secrets.STRIPE_WEBHOOK_SECRET }}
        run: pnpm medcert:readiness:e2e

      - name: Run non-medcert paid critical E2E flows (Chromium)
        # Same rationale: run for full signal even if an earlier step failed.
        # NOT error-tolerant — a failure here still fails the job.
        if: ${{ always() && steps.verify_e2e_secrets.outcome == 'success' }}
        env:
          PLAYWRIGHT: '1'
          NEXT_PUBLIC_PLAYWRIGHT: '1'
          E2E_SECRET: ${{ secrets.E2E_SECRET }}
          ENCRYPTION_KEY: ${{ secrets.ENCRYPTION_KEY }}
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          NEXT_PUBLIC_APP_URL: http://localhost:3001
          STRIPE_WEBHOOK_SECRET: ${{ secrets.STRIPE_WEBHOOK_SECRET }}
          PARCHMENT_WEBHOOK_SECRET: ${{ secrets.PARCHMENT_WEBHOOK_SECRET }}
          PARCHMENT_ORGANIZATION_ID: ${{ secrets.PARCHMENT_ORGANIZATION_ID }}
          PARCHMENT_PARTNER_ID: ${{ secrets.PARCHMENT_PARTNER_ID }}
        run: >
          pnpm exec playwright test --project=chromium
          e2e/unified-request-flow.spec.ts
          e2e/consult-subtypes.spec.ts
          e2e/intake-terminal-blocks.spec.ts
          e2e/parchment-webhook.spec.ts

      - name: Run signed guest resume safety E2E (Chromium)
        if: ${{ always() && steps.verify_e2e_secrets.outcome == 'success' }}
        env:
          PLAYWRIGHT: '1'
          NEXT_PUBLIC_PLAYWRIGHT: '1'
          E2E_SECRET: ${{ secrets.E2E_SECRET }}
          INTERNAL_API_SECRET: ${{ secrets.E2E_SECRET }}
          ENCRYPTION_KEY: ${{ secrets.ENCRYPTION_KEY }}
          PHI_ENCRYPTION_ENABLED: 'true'
          PHI_ENCRYPTION_READ_ENABLED: 'true'
          PHI_ENCRYPTION_WRITE_ENABLED: 'true'
          PHI_MASTER_KEY: ${{ secrets.ENCRYPTION_KEY }}
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          NEXT_PUBLIC_APP_URL: http://localhost:3001
          PLAYWRIGHT_HTML_OUTPUT_DIR: playwright-report-checkout-resume
        run: pnpm exec playwright test --project=chromium --output=test-results-checkout-resume e2e/checkout-resume.spec.ts

      - name: Upload test results
        uses: actions/upload-artifact@v7.0.1
        if: always()
        with:
          name: playwright-report
          path: |
            playwright-report/
            playwright-report-checkout-resume/
          retention-days: 7

      - name: Upload test traces on failure
        uses: actions/upload-artifact@v7.0.1
        if: failure()
        with:
          name: playwright-traces
          path: |
            test-results/
            test-results-checkout-resume/
          retention-days: 7
