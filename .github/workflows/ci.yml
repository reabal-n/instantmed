name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Use Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Security audit
        run: pnpm audit --audit-level=critical

      - name: Run lint
        run: pnpm lint

      - name: Run unit tests with coverage
        run: pnpm test --run --coverage

      - name: Check for route conflicts
        run: bash scripts/check-route-conflicts.sh

      - name: Type-check and build
        env:
          NEXT_PUBLIC_SUPABASE_URL: https://placeholder.supabase.co
          NEXT_PUBLIC_SUPABASE_ANON_KEY: placeholder-anon-key-for-build
          SUPABASE_SERVICE_ROLE_KEY: placeholder-service-role-key-for-build
          NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: pk_live_Y2xlcmsuaW5zdGFudG1lZC5jb20uYXUk
          NEXT_PUBLIC_APP_URL: http://localhost:3000
        run: pnpm build
