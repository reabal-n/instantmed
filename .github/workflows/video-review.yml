name: Video review (auto)

# Triggers:
#   - Vercel deployment_status (only on production "success") - automatic
#   - workflow_dispatch - manual via `gh workflow run video-review.yml`
#
# Loop guard: skip the run if the commit message contains [skip review].
# The bot's own commits include this tag so a self-trigger does not
# recurse.

on:
  deployment_status: {}
  workflow_dispatch:
    inputs:
      journey:
        description: "paid-funnel | brand-spine | homepage"
        required: false
        default: "paid-funnel"
        type: choice
        options:
          - paid-funnel
          - brand-spine
          - homepage
      url:
        description: "Capture target URL (default: live prod)"
        required: false
        default: "https://instantmed.com.au"
        type: string

permissions:
  contents: read

concurrency:
  # Only one auto review at a time. Cancel any superseded run.
  group: video-review-${{ github.workflow }}
  cancel-in-progress: false

jobs:
  review:
    # Auto-trigger only on successful production deploys.
    # Manual dispatch bypasses this gate.
    if: >
      github.event_name == 'workflow_dispatch' ||
      (
        github.event_name == 'deployment_status' &&
        github.event.deployment_status.state == 'success' &&
        github.event.deployment.environment == 'Production' &&
        !contains(github.event.deployment_status.description, '[skip review]')
      )
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - name: Checkout main
        uses: actions/checkout@v6.0.2
        with:
          ref: main
          fetch-depth: 0

      - name: Loop guard - skip if HEAD says [skip review]
        id: skip-review-guard
        run: |
          MSG=$(git log -1 --pretty=%B)
          if echo "$MSG" | grep -q '\[skip review\]'; then
            echo "::notice::HEAD commit has [skip review], skipping video review."
            echo "skip_review=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip_review=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Setup pnpm
        if: steps.skip-review-guard.outputs.skip_review != 'true'
        uses: pnpm/action-setup@v6.0.5

      - name: Use Node.js from .nvmrc
        if: steps.skip-review-guard.outputs.skip_review != 'true'
        uses: actions/setup-node@v6.4.0
        with:
          node-version-file: ".nvmrc"
          cache: pnpm

      - name: Install dependencies
        if: steps.skip-review-guard.outputs.skip_review != 'true'
        run: pnpm install --frozen-lockfile

      - name: Install Playwright chromium
        if: steps.skip-review-guard.outputs.skip_review != 'true'
        run: pnpm exec playwright install --with-deps chromium

      - name: Run video review pipeline
        if: steps.skip-review-guard.outputs.skip_review != 'true'
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          JOURNEY="${{ github.event.inputs.journey || 'paid-funnel' }}"
          URL_INPUT="${{ github.event.inputs.url }}"
          DEPLOY_URL="${{ github.event.deployment_status.target_url }}"
          AUTO_URL="https://instantmed.com.au"
          if [ "${{ github.event_name }}" = "deployment_status" ]; then
            # Production deployment target_url can be a protected Vercel URL;
            # auto reviews need the public canonical domain.
            URL="${URL_INPUT:-$AUTO_URL}"
          else
            URL="${URL_INPUT:-${DEPLOY_URL:-$AUTO_URL}}"
          fi
          echo "Journey: $JOURNEY"
          echo "URL:     $URL"
          pnpm tsx scripts/video-review/index.ts \
            --journey="$JOURNEY" \
            --url="$URL"

      - name: Prepare review artifact
        if: steps.skip-review-guard.outputs.skip_review != 'true'
        id: review-artifact
        run: |
          RUN_DIR=$(ls -1dt docs/reviews/*/ 2>/dev/null | head -1 || echo "")
          if [ -z "$RUN_DIR" ]; then
            echo "No review artifacts generated."
            echo "artifact_ready=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          RUN_ID=$(basename "${RUN_DIR%/}")
          echo "artifact_ready=true" >> "$GITHUB_OUTPUT"
          echo "run_id=$RUN_ID" >> "$GITHUB_OUTPUT"
          echo "run_dir=${RUN_DIR%/}" >> "$GITHUB_OUTPUT"
          {
            echo "### Video review artifact"
            echo ""
            echo "- Run: \`$RUN_ID\`"
            echo "- Download the \`video-review-$RUN_ID\` artifact from this workflow run."
            echo "- Review artifacts are not pushed to protected \`main\` automatically."
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload review artifact
        if: steps.review-artifact.outputs.artifact_ready == 'true'
        uses: actions/upload-artifact@v7.0.1
        with:
          name: video-review-${{ steps.review-artifact.outputs.run_id }}
          path: ${{ steps.review-artifact.outputs.run_dir }}
          if-no-files-found: error
          retention-days: 30
