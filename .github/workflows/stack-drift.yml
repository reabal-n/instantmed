name: Stack Health Audit

on:
  schedule:
    - cron: "0 20 1 * *"
  workflow_dispatch:

jobs:
  stack-drift:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6.0.2

      - name: Setup pnpm
        uses: pnpm/action-setup@v6.0.5

      - name: Use Node.js from .nvmrc
        uses: actions/setup-node@v6.4.0
        with:
          node-version-file: ".nvmrc"
          cache: "pnpm"

      - name: Check active Node runtime
        run: bash scripts/check-node-runtime.sh

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Check stack pins
        run: bash scripts/check-stack-pins.sh

      - name: Check dependency dedupe
        run: pnpm dedupe --check

      - name: Security audit
        run: pnpm audit --audit-level=high

      - name: Dependency drift report
        run: |
          echo "## Monthly stack health" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "- Node: $(node -v)" >> "$GITHUB_STEP_SUMMARY"
          echo "- pnpm: $(pnpm -v)" >> "$GITHUB_STEP_SUMMARY"
          echo "- Framework pins: checked" >> "$GITHUB_STEP_SUMMARY"
          echo "- Dedupe: checked" >> "$GITHUB_STEP_SUMMARY"
          echo "- High-severity audit: checked" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "### Outdated packages (review only)" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          pnpm outdated --format long > /tmp/instantmed-outdated.txt || true
          if [ -s /tmp/instantmed-outdated.txt ]; then
            echo '```' >> "$GITHUB_STEP_SUMMARY"
            sed -n '1,120p' /tmp/instantmed-outdated.txt >> "$GITHUB_STEP_SUMMARY"
            echo '```' >> "$GITHUB_STEP_SUMMARY"
          else
            echo "No outdated packages reported." >> "$GITHUB_STEP_SUMMARY"
          fi
